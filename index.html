<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CleanBot Color Action</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  transition: background 1s;
}

/* 상단 UI */
#ui {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
}

#world {
  font-size: 18px;
  margin-bottom: 4px;
}

#stats {
  font-size: 14px;
  color: #00ffd5;
}

/* 게임 필드 */
#game {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* 쓰레기 */
.trash {
  position: absolute;
  font-size: 32px;
  cursor: pointer;
  animation: float 3.5s linear forwards;
}

@keyframes float {
  from { transform: translateY(120px) scale(0.8); opacity: 1; }
  to { transform: translateY(-220px) scale(1.3); opacity: 0; }
}

/* 팝업 */
.pop {
  position: absolute;
  font-size: 18px;
  color: #ff9800;
  animation: pop 0.9s ease-out forwards;
  pointer-events: none;
}

@keyframes pop {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0; transform: translateY(-50px) scale(1.5); }
}

/* 아이템 바 */
#items {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 10;
}

.item {
  background: linear-gradient(135deg, #ff4081, #ff9800);
  padding: 12px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 18px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.item.disabled {
  opacity: 0.4;
}
</style>
</head>

<body>

<div id="ui">
  <div id="world">🌫️ 회색빛 쓰레기 마을</div>
  <div id="stats">
    🗑️ <span id="trash">0</span> |
    ♻️ EP <span id="ep">0</span> |
    🤖 자동 <span id="auto">2</span>/s
  </div>
</div>

<div id="game"></div>

<div id="items">
  <div class="item" id="magnet" onclick="useMagnet()">🧲</div>
  <div class="item" id="boost" onclick="useBoost()">⚡</div>
  <div class="item" id="drone" onclick="useDrone()">🚁</div>
</div>

<script>
let trash = 0;
let ep = 0;
let auto = 2;
let level = 1;

let magnet = 0;
let boost = 0;
let drone = 0;

const game = document.getElementById("game");

function spawnTrash() {
  const t = document.createElement("div");
  t.className = "trash";
  t.innerText = "🗑️";
  t.style.left = Math.random() * (window.innerWidth - 40) + "px";
  t.style.bottom = "-60px";

  t.onclick = (e) => {
    trash++;
    dropItem();
    pop("+1", e.clientX, e.clientY);
    t.remove();
    update();
  };

  game.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function pop(text, x, y) {
  const p = document.createElement("div");
  p.className = "pop";
  p.innerText = text;
  p.style.left = x + "px";
  p.style.top = y + "px";
  game.appendChild(p);
  setTimeout(() => p.remove(), 900);
}

function autoCollect() {
  trash += auto + magnet;
  update();
}

function dropItem() {
  const r = Math.random();
  if (r < 0.05) magnet++;
  else if (r < 0.08) boost++;
  else if (r < 0.1) drone++;
  updateItems();
}

function useMagnet() {
  if (magnet <= 0) return;
  magnet--;
  auto += 2;
  setTimeout(() => auto -= 2, 5000);
  updateItems();
}

function useBoost() {
  if (boost <= 0) return;
  boost--;
  for (let i = 0; i < 10; i++) spawnTrash();
  updateItems();
}

function useDrone() {
  if (drone <= 0) return;
  drone--;
  ep += 10;
  updateItems();
  update();
}

function update() {
  document.getElementById("trash").innerText = trash;
  document.getElementById("ep").innerText = ep;
  document.getElementById("auto").innerText = auto;

  const newLevel = Math.floor(ep / 15) + 1;
  if (newLevel !== level) {
    level = newLevel;
    updateWorld();
  }
}

function updateItems() {
  document.getElementById("magnet").classList.toggle("disabled", magnet <= 0);
  document.getElementById("boost").classList.toggle("disabled", boost <= 0);
  document.getElementById("drone").classList.toggle("disabled", drone <= 0);
}

function updateWorld() {
  if (level < 2) document.body.style.background = "#444";
  else if (level < 4) document.body.style.background = "#2f5f6f";
  else if (level < 6) document.body.style.background = "#2a7fb8";
  else document.body.style.background = "#1e88e5";

  const w = document.getElementById("world");
  if (level < 2) w.innerText = "🌫️ 회색빛 쓰레기 마을";
  else if (level < 4) w.innerText = "🌱 정화 중인 마을";
  else w.innerText = "🌳 푸른 친환경 마을";
}

setInterval(spawnTrash, 700);
setInterval(autoCollect, 1000);
</script>

</body>
</html>
