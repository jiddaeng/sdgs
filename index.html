<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Eco Robot Evolution</title>
<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white}
.top{background:#111827;padding:15px;display:flex;justify-content:space-between}
.container{display:flex;height:calc(100vh - 60px)}
.world{
flex:3;position:relative;overflow:hidden;
background:linear-gradient(#555,#333);
transition:1s;
}
.panel{flex:1;background:#1e293b;padding:15px}
.bar{height:24px;background:#334155;border-radius:20px;overflow:hidden}
.fill{height:100%;width:0%;background:#22c55e;transition:.5s}
button{
width:100%;padding:12px;margin-top:8px;border:none;
border-radius:10px;background:#16a34a;color:white;font-weight:bold;cursor:pointer;
}
.card{background:#334155;padding:10px;border-radius:10px;margin-top:10px}
.trash{position:absolute;font-size:30px;cursor:pointer}
</style>
</head>
<body>

<div class="top">
<div>🤖 Eco Robot Evolution</div>
<div>EP: <span id="ep">0</span> | Lv.<span id="lv">1</span></div>
</div>

<div class="container">
<div id="world" class="world"></div>

<div class="panel">
<h2>🌎 정화 진행도</h2>
<div class="bar"><div id="fill" class="fill"></div></div>
<p id="percent">0%</p>

<div class="card">
<h3>현재 상태</h3>
<div id="stage">🗑 폐기물 투기장</div>
</div>

<button onclick="buySpeed()">⚡ 속도 업 (+1) 20EP</button>
<button onclick="buyValue()">💰 효율 업 (+1) 30EP</button>

<div class="card">
속도: <span id="speed">1</span><br>
효율: <span id="value">1</span>
</div>
</div>
</div>

<script>
let ep=0,speed=1,value=1,clean=0;

const stages=[
"🗑 폐기물 투기장",
"🌫 오염된 공터",
"🚮 쓰레기 수거 시작",
"🌿 잡초가 자라기 시작",
"🌳 작은 공원 조성",
"🏡 깨끗한 주택가",
"🌲 녹지 확장",
"🌸 꽃이 피는 마을",
"🦋 생태 복원 지역",
"🌎 친환경 스마트 시티",
"✨ 탄소중립 미래도시"
];

function update(){
document.getElementById('ep').textContent=Math.floor(ep);
document.getElementById('speed').textContent=speed;
document.getElementById('value').textContent=value;

let level=Math.min(10,Math.floor(clean/10)+1);
document.getElementById('lv').textContent=level;

document.getElementById('fill').style.width=clean+'%';
document.getElementById('percent').textContent=clean+'%';

let idx=Math.min(10,Math.floor(clean/10));
document.getElementById('stage').textContent=stages[idx];

const colors=[
['#555','#333'],['#606060','#3c3c3c'],['#5f6b5f','#404040'],
['#537253','#365236'],['#4f874f','#2e6b2e'],['#4ba14b','#2b702b'],
['#3db53d','#267526'],['#2fc42f','#227422'],['#20d020','#1e6e1e'],
['#12dc12','#176917'],['#0be40b','#116611']
];

document.getElementById('world').style.background=
`linear-gradient(${colors[idx][0]},${colors[idx][1]})`;

localStorage.setItem("ecoSave",JSON.stringify({ep,speed,value,clean}));
}

function spawn(){
const t=document.createElement('div');
const arr=['🧴','🥫','📄'];
t.className='trash';
t.textContent=arr[Math.floor(Math.random()*arr.length)];
t.style.left=Math.random()*95+'%';
t.style.top=Math.random()*90+'%';

t.onclick=()=>{
ep+=value;
clean=Math.min(100,clean+1);
t.remove();
update();
};

world.appendChild(t);
setTimeout(()=>{if(t.parentNode)t.remove();},12000);
}

function buySpeed(){
if(ep>=20){ep-=20;speed++;update();}
else alert("EP가 부족합니다!");
}
function buyValue(){
if(ep>=30){ep-=30;value++;update();}
else alert("EP가 부족합니다!");
}

setInterval(spawn,900);

setInterval(()=>{
ep+=speed;
clean=Math.min(100,clean+0.2);
update();
},3000);

const save=localStorage.getItem("ecoSave");
if(save){
const d=JSON.parse(save);
ep=d.ep;speed=d.speed;value=d.value;clean=d.clean;
}
update();
</script>
</body>
</html>
