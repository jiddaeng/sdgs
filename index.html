<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>CleanBot</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(#1b1b1b, #2e2e2e);
    font-family: 'Pretendard', Arial, sans-serif;
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
  }

  .world {
    font-size: 18px;
    margin-bottom: 10px;
  }

  .container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
  }

  .card {
    background: #333;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #4caf50;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }

  button:active {
    transform: scale(0.96);
    background: #43a047;
  }

  .stat {
    font-size: 16px;
    margin: 6px 0;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 12px 20px;
    border-radius: 20px;
    display: none;
    font-size: 14px;
  }

  .levelup {
    animation: flash 0.6s;
  }

  @keyframes flash {
    0% { background: #2e2e2e; }
    50% { background: #4caf50; }
    100% { background: #2e2e2e; }
  }
</style>
</head>
<body>

<h1>🤖 CleanBot</h1>
<div class="world" id="world">🌫️ 회색빛 쓰레기 마을</div>

<div class="container">

  <div class="card">
    <div class="stat">🗑️ 쓰레기: <span id="trash">0</span></div>
    <button onclick="collect()">쓰레기 수거</button>
  </div>

  <div class="card">
    <div class="stat">♻️ EP: <span id="ep">0</span></div>
    <button onclick="recycle()">분리수거</button>
  </div>

  <div class="card">
    <div class="stat">🤖 자동 수거: <span id="auto">1</span>/초</div>
    <button onclick="upgrade()">업그레이드 (10 EP)</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let trash = 0;
let ep = 0;
let autoSpeed = 1;
let level = 1;

function collect() {
  trash++;
  showToast("🗑️ 쓰레기 +1");
  update();
}

function recycle() {
  if (trash === 0) return;
  ep += trash;
  showToast(`♻️ EP +${trash}`);
  trash = 0;
  checkLevel();
  update();
}

function upgrade() {
  if (ep < 10) {
    showToast("❌ EP가 부족합니다");
    return;
  }
  ep -= 10;
  autoSpeed++;
  showToast("🤖 자동 수거 강화!");
  update();
}

function autoCollect() {
  trash += autoSpeed;
  if (Math.random() < 0.15) randomEvent();
  update();
}

function randomEvent() {
  const events = [
    { msg: "✨ 시민 도움! EP +5", effect: () => ep += 5 },
    { msg: "🚨 쓰레기 폭증!", effect: () => trash += 5 },
    { msg: "🔋 로봇 효율 증가!", effect: () => autoSpeed++ }
  ];
  const e = events[Math.floor(Math.random() * events.length)];
  e.effect();
  showToast(e.msg);
}

function checkLevel() {
  let newLevel = Math.floor(ep / 20) + 1;
  if (newLevel > level) {
    level = newLevel;
    document.body.classList.add("levelup");
    setTimeout(() => document.body.classList.remove("levelup"), 600);
    updateWorld();
    showToast(`🌱 마을 레벨 ${level} 달성!`);
  }
}

function updateWorld() {
  const world = document.getElementById("world");
  if (level < 2) world.innerText = "🌫️ 회색빛 쓰레기 마을";
  else if (level < 4) world.innerText = "🌿 조금 깨끗해진 마을";
  else world.innerText = "🌳 푸른 친환경 마을";
}

function showToast(text) {
  const toast = document.getElementById("toast");
  toast.innerText = text;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 1200);
}

function update() {
  document.getElementById("trash").innerText = trash;
  document.getElementById("ep").innerText = ep;
  document.getElementById("auto").innerText = autoSpeed;
}

setInterval(autoCollect, 1000);
</script>

</body>
</html>
